scenario:
  name: Simple Project Setup Demo
  description: Demonstrates basic project setup and verification workflow
  version: 1.0

  captions:
    intro: "Project setup demonstration"
    setup: "Initializing project structure"
    verification: "Verifying setup"
    completion: "Setup complete"

  steps:
    - type: shell
      command: echo "📦 Setting up new project..."
      caption: "Initialize project"

    - type: shell
      command: pwd
      caption: "Check working directory"

    - type: shell
      command: ls -la
      caption: "View project files"

    - type: shell
      command: git --version && node --version && npm --version
      caption: "Verify development tools installed"

    - type: shell
      command: echo "✅ All systems ready for development!"
      caption: "Setup verification complete"

  metadata:
    tags:
      - setup
      - project
      - verification
      - demo
    difficulty: beginner
    estimated_time: 20s
