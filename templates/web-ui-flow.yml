scenario:
  name: Web UI Flow - Interactive Demo
  description: Complete browser workflow demonstrating navigation, element interaction, and dynamic content
  version: 1.0

  captions:
    intro: "Web UI Interaction Demo"
    navigation: "Loading interactive demo site"
    interaction: "Testing element interactions"
    dropdown: "Working with dropdown elements"
    selection: "Making form selections"
    conclusion: "Demo complete!"

  steps:
    - type: navigate
      url: https://the-internet.herokuapp.com/
      caption: "Navigate to demo site"
      timeout: 30000
      delay: 1000

    - type: screenshot
      caption: "Demo site homepage loaded"
      delay: 500

    - type: click
      selector: "a[href='/dropdown']"
      caption: "Click dropdown example link"
      delay: 800

    - type: screenshot
      caption: "Dropdown page loaded"
      delay: 1000

    - type: click
      selector: "#dropdown"
      caption: "Click dropdown menu"
      delay: 800

    - type: wait
      delay: 500
      caption: "Dropdown opened"

    - type: screenshot
      caption: "Dropdown options visible"
      delay: 1000

  metadata:
    tags:
      - web
      - ui
      - browser
      - dropdown
    difficulty: intermediate
    estimated_time: 45s
    browser_config:
      headless: true
      viewport:
        width: 1280
        height: 720
