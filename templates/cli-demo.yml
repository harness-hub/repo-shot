scenario:
  name: CLI Demo - Basic Commands
  description: Demonstrates basic CLI commands and output
  version: 1.0
  
  captions:
    intro: "Let's explore some basic shell commands"
    demo: "Running commands in the terminal"
    conclusion: "These are fundamental CLI operations"

  steps:
    - type: shell
      command: echo "Welcome to repo-shot CLI"
      caption: "Echo a welcome message"

    - type: shell
      command: echo "Current directory:" && pwd
      caption: "Display current working directory"

    - type: shell
      command: ls -la
      caption: "List files in detailed format"
      
    - type: sequence
      caption: "Create and verify a file"
      commands:
        - echo "Hello from repo-shot" > demo.txt
        - cat demo.txt
        - rm demo.txt

  metadata:
    tags:
      - cli
      - basic
      - demo
    difficulty: beginner
    estimated_time: 30s
