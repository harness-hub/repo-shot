<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>repo-shot local browser fixture</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: #172033;
      }

      main {
        max-width: 720px;
        margin: 56px auto;
        padding: 0 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 40px;
        letter-spacing: 0;
      }

      form {
        display: grid;
        gap: 12px;
        margin-top: 28px;
        max-width: 420px;
      }

      input,
      button {
        height: 44px;
        border-radius: 6px;
        font: inherit;
      }

      input {
        border: 1px solid #c8ceda;
        padding: 0 12px;
      }

      button {
        border: 0;
        background: #1769e0;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      #result {
        margin-top: 20px;
        min-height: 28px;
        font-weight: 700;
        color: #0b6b3a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Local Browser Demo</h1>
      <p>This page is bundled with repo-shot so browser examples can run without external sites.</p>

      <form>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com">
        <button id="submit" type="button">Submit</button>
      </form>

      <div id="result" aria-live="polite"></div>
    </main>

    <script>
      document.querySelector('#submit').addEventListener('click', () => {
        const email = document.querySelector('#email').value || 'friend@example.com';
        document.querySelector('#result').textContent = `Ready for ${email}`;
      });
    </script>
  </body>
</html>
