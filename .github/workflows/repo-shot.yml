name: repo-shot demo

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  generate-demo:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm test
      - run: node ./src/index.js run templates/cli-demo.yml --output artifacts/cli --format gif
      - run: node ./src/index.js run templates/local-browser.yml --output artifacts/browser --format gif

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-shot-artifacts
          path: artifacts/
          if-no-files-found: ignore
